services:
  postgres:
    image: postgres:16
    container_name: cafe-pos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cafepos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cafepos}
      POSTGRES_DB: ${POSTGRES_DB:-cafepos}
    ports:
      # Host port is overridable (set POSTGRES_PORT in .env if 5432 is taken).
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cafe_pos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cafepos} -d ${POSTGRES_DB:-cafepos}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cafe_pos_pgdata:
